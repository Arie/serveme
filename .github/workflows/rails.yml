name: Ruby

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  ruby-dependencies:
    name: Ruby dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

  linters:
    name: Linters
    runs-on: ubuntu-latest
    needs: [ruby-dependencies]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Check CSV files are sorted and deduplicated
        run: script/sort_and_dedup_csv

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

      - name: Lint code for consistent style
        run: bin/rubocop -f github

      - name: Perform Sorbet typechecks
        run: bin/srb tc

      - name: Verify Tapioca Gems
        run: bin/tapioca gem --verify

  rspec:
    name: RSpec
    runs-on: ubuntu-latest
    needs: [ruby-dependencies]
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: serveme
          POSTGRES_DB: serveme_test
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository ppa:maxmind/ppa
          sudo apt update
          sudo apt install libmaxminddb0 libmaxminddb-dev redis-server memcached ripgrep

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup test database
        env:
          RAILS_ENV: test
          PGHOST: localhost
          PGUSER: serveme
          PGPASSWORD: secret
        run: bin/rails db:create db:migrate

      - name: Debug RAILS_MASTER_KEY (temporary)
        env:
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: |
          printf 'len=%s sha256=%s\n' "${#RAILS_MASTER_KEY}" "$(printf '%s' "$RAILS_MASTER_KEY" | sha256sum | cut -d' ' -f1)"
          printf 'credentials.yml.enc sha256=%s\n' "$(sha256sum config/credentials.yml.enc | cut -d' ' -f1)"

      - name: Verify Tapioca DSL
        env:
          RAILS_ENV: test
          PGHOST: localhost
          PGUSER: serveme
          PGPASSWORD: secret
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: bin/tapioca dsl --verify

      - name: Verify swagger.yaml is in sync with swagger specs
        env:
          RAILS_ENV: test
          PGHOST: localhost
          PGUSER: serveme
          PGPASSWORD: secret
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: script/check_swagger_sync

      - name: Run RSpec tests
        env:
          RAILS_ENV: test
          PGHOST: localhost
          PGUSER: serveme
          PGPASSWORD: secret
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: bundle exec rspec spec

  cucumber:
    name: Cucumber
    runs-on: ubuntu-latest
    needs: [ruby-dependencies]
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: serveme
          POSTGRES_DB: serveme_test
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository ppa:maxmind/ppa
          sudo apt update
          sudo apt install libmaxminddb0 libmaxminddb-dev redis-server memcached

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup test database
        env:
          RAILS_ENV: test
          PGHOST: localhost
          PGUSER: serveme
          PGPASSWORD: secret
        run: bin/rails db:create db:migrate

      - name: Run Cucumber features
        env:
          RAILS_ENV: test
          PGHOST: localhost
          PGUSER: serveme
          PGPASSWORD: secret
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: bundle exec cucumber features
