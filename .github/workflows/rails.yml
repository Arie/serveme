name: Ruby

on:
  push:
    branches: [master]
  pull_request:

# CI only needs to read the repository; restrict the default token.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  ruby-dependencies:
    name: Ruby dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # libmaxminddb-dev provides the headers to compile hive_geoip2's native
      # extension. This job warms the bundler cache that every other job reuses.
      - name: Install dependencies
        run: |
          sudo add-apt-repository ppa:maxmind/ppa
          sudo apt update
          sudo apt install libmaxminddb0 libmaxminddb-dev

      - uses: ./.github/actions/ruby

  linters:
    name: Linters
    runs-on: ubuntu-latest
    needs: [ruby-dependencies]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/ruby

      - name: Check CSV files are sorted and deduplicated
        run: script/sort_and_dedup_csv

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

      - name: Lint code for consistent style
        run: bin/rubocop -f github

      - name: Perform Sorbet typechecks
        run: bin/srb tc

      - name: Verify Tapioca Gems
        run: bin/tapioca gem --verify

  rspec:
    name: RSpec
    runs-on: ubuntu-latest
    needs: [ruby-dependencies]
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: serveme
          POSTGRES_DB: serveme_test
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # libmaxminddb0 is the runtime library hive_geoip2 links against; the
      # compiled gem itself comes from the bundler cache (no -dev headers needed).
      - name: Install dependencies
        run: |
          sudo add-apt-repository ppa:maxmind/ppa
          sudo apt update
          sudo apt install libmaxminddb0 redis-server memcached ripgrep

      - uses: ./.github/actions/ruby

      - name: Write development credentials key
        env:
          RAILS_DEVELOPMENT_KEY: ${{ secrets.RAILS_DEVELOPMENT_KEY }}
        run: printf '%s' "$RAILS_DEVELOPMENT_KEY" > config/credentials/development.key

      - name: Setup databases
        env:
          PGHOST: localhost
          PGUSER: serveme
          PGPASSWORD: secret
        run: |
          RAILS_ENV=test bin/rails db:create db:migrate
          RAILS_ENV=development bin/rails db:create db:migrate

      - name: Verify Tapioca DSL
        env:
          PGHOST: localhost
          PGUSER: serveme
          PGPASSWORD: secret
        run: bin/tapioca dsl --verify

      - name: Verify swagger.yaml is in sync with swagger specs
        env:
          RAILS_ENV: test
          PGHOST: localhost
          PGUSER: serveme
          PGPASSWORD: secret
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: script/check_swagger_sync

      - name: Run RSpec tests
        env:
          RAILS_ENV: test
          PGHOST: localhost
          PGUSER: serveme
          PGPASSWORD: secret
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: bundle exec rspec spec

  cucumber:
    name: Cucumber
    runs-on: ubuntu-latest
    needs: [ruby-dependencies]
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: serveme
          POSTGRES_DB: serveme_test
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # libmaxminddb0 is the runtime library hive_geoip2 links against; the
      # compiled gem itself comes from the bundler cache (no -dev headers needed).
      - name: Install dependencies
        run: |
          sudo add-apt-repository ppa:maxmind/ppa
          sudo apt update
          sudo apt install libmaxminddb0 redis-server memcached

      - uses: ./.github/actions/ruby

      - name: Setup test database
        env:
          RAILS_ENV: test
          PGHOST: localhost
          PGUSER: serveme
          PGPASSWORD: secret
        run: bin/rails db:create db:migrate

      - name: Run Cucumber features
        env:
          RAILS_ENV: test
          PGHOST: localhost
          PGUSER: serveme
          PGPASSWORD: secret
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: bundle exec cucumber features
