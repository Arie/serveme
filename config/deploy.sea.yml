# SEA — 15.235.200.251 (OVH VPS Singapore, 2C/3.7G/50G). Pulls images from
# ghcr.io like other regions; no local builder.
servers:
  web:         { hosts: [direct.sea.serveme.tf] }
  sidekiq:     { hosts: [direct.sea.serveme.tf] }
  discord_bot: { hosts: [direct.sea.serveme.tf] }
  logdaemon:   { hosts: [direct.sea.serveme.tf] }

proxy:
  hosts:
    - sea.serveme.tf
    - direct.sea.serveme.tf

env:
  clear:
    SITE_HOST: sea.serveme.tf
    SITE_URL:  https://sea.serveme.tf
