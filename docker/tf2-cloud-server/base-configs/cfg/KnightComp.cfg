// This config is a modified ETF2L config. Modified to allow for up to 6 Demomen, up to 1 Soldier, up to 1 Medic, and up to 0 of any other class.
// We have also made some other changes, like return-on-touch-mode being enabled for CTF.

log on

exec KnightComp_Custom.cfg

tv_delay 90
tv_delaymapchange 1
tv_relayvoice 0
tv_transmitall 1

host_framerate 0

mp_allowspectators 1
mp_bonusroundtime 10
mp_disable_respawn_times 0
mp_enableroundwaittime 1
mp_fadetoblack 0
mp_footsteps 1
mp_forcecamera 1
mp_fraglimit 0
mp_friendlyfire 0
mp_highlander 0
mp_idledealmethod 0
mp_match_end_at_timelimit 1
mp_respawnwavetime 10.0
mp_stalemate_enable 0
mp_teams_unbalance_limit 0
mp_tournament 1
mp_tournament_allow_non_admin_restart 0
mp_tournament_stopwatch 1

sv_allow_votes 0
sv_allow_wait_command 0
sv_allowupload 0
sv_alltalk 0
sv_cheats 0
sv_client_max_interp_ratio 5
sv_client_min_interp_ratio 1
sv_client_predict 1
sv_consistency 1
sv_gravity 800
sv_maxcmdrate 66
sv_maxrate 0
sv_maxupdaterate 66
sv_mincmdrate 66
sv_minrate 20000
sv_minupdaterate 66
sv_pausable 1
sv_pure 2
sv_pure_kick_clients 1
sv_restrict_aspect_ratio_fov 0
sv_timeout 10

tf_arena_first_blood 0
tf_avoidteammates_pushaway 0
tf_clamp_airducks 1
tf_ctf_bonus_time 0
tf_damage_disablespread 1
tf_flag_caps_per_round 5
tf_teamtalk 1
tf_tournament_hide_domination_icons 1
tf_use_fixed_weaponspreads 1
tf_weapon_criticals 0
tf_dropped_weapon_lifetime 0
tf_preround_push_from_damage_enable 1
tf_spawn_glows_duration 0

tf_powerup_mode 0
tf_grapplinghook_enable 0
tf_passtime_score_crit_sec 		0
tf_passtime_powerball_passpoints 	0
tf_passtime_powerball_airtimebonus 	0
tf_passtime_scores_per_round 5



// CLASSLIMITS AND WHITELIST

mp_tournament_whitelist "cfg/custom_whitelist_9694.txt"

tftrue_whitelist_id "9694"

tf_tournament_classlimit_scout 0
tf_tournament_classlimit_soldier 1
tf_tournament_classlimit_pyro 0
tf_tournament_classlimit_demoman -1
tf_tournament_classlimit_heavy 0
tf_tournament_classlimit_engineer 0
tf_tournament_classlimit_medic 1
tf_tournament_classlimit_sniper 0
tf_tournament_classlimit_spy 0

// PLUGIN

sm_disablestickies 1

//

mp_tournament_restart

say * KnightComp config (31st. January 2019) loaded.

say * Unlimited Demomen. Max 1 Soldier. Max 1 Medic. Stickybombs are forbidden in this ruleset.

say * Please check that the settings are correct for this game mode!
