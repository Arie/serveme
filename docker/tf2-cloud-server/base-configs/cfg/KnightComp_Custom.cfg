//== Optional server settings
//== This config is automatically executed by the base KnightComp config.
//== These settings are optional, though recommended by KnightComp staff. You may customize or disable them.
//== IMPORTANT: do not override cvars set by other KnightComp configs. 

//These settings make the SourceTV viewing experience noticeably smoother
tv_snapshotrate 66
tv_allow_camera_man 0
tv_allow_static_shots 0
tv_delaymapchange_protect 1

//The default interval between messages is 8 seconds, which is a bit on the high side
tv_chattimelimit 3
