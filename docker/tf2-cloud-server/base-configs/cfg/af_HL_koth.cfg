// KoTH config for AsiaFortress Highlander
// Config originally created 26th May, 2024          -- Updated 26th May, 2024
// DO NOT EXEC THIS MANUALLY

exec "af_HL_base"

servercfgfile "af_HL_koth" // sets server cfg to this config so that it gets autoexeced on level change

mp_timelimit "0"            // unsets server timelimit
mp_winlimit "2"             // sets number of wins to win each half to 2
mp_windifference "0"        // unsets windifference
mp_maxrounds "0"            // unsets maxrounds

mp_tournament_restart       // restarts the tournament to apply above settings


say "AsiaFortress Highlander KoTH Config Executed."
say "First to 4 wins the match. Half every 2 rounds."
say "This config is to be used for Qualifiers and Playoffs."
say "To be safe, please ***CHANGELEVEL*** to reload all settings properly and prevent any crashes."
say "You will need to reexec this config after a team wins a total of 4 rounds."