//=== Andyvich 4v4 Configs
//=== 25-09-2013
//=== Pretty much ripped from UGC configs
//=== This config is for Attack and Defence maps

//=== Sets the league config as server default for duration of match 
//=== used to enforce pure 2 map load file consistency on all players in server.
servercfgfile 	"andyvichstopwatch.cfg"	

//== Basic League Settings 
exec "andyvichbase.cfg"

//=== Gameplay Settings for STOPWATCH type maps ===
mp_windifference		"0"
mp_winlimit			"0" 
mp_maxrounds			"2" 
mp_timelimit 			"0" 
mp_tournament_stopwatch 	"1"

say "Andyvich 4v4 Stopwatch Config - 29-05-2013"
say "Reload the map once before starting!"
say "Winner is first to win TWO Stopwatch rounds"
say "Reload the map after each Stopwatch round"
say "Exec andyvich_off.cfg at match end to reset server."