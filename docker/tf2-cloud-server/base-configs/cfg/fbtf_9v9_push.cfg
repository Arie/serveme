// FBTF PUSH 9v9 CFG
exec fbtf_common.cfg

mp_timelimit			"30"
mp_winlimit 			"5"

exec fbtf_9v9.cfg

say FBTF 9v9 CFG - Mapas PUSH (5 control points)
say Pontuacao PUSH: a partida termina apos 30 minutos ou se um time ganhar 5 rounds em qualquer momento da partida
say Em caso de empate, execute fbtf_golden_cap.cfg para Golden Cap sem limite de tempo.
say ------------
say **Aviso**: Lembrem-se que e necessario gravar POV-demo, alem de screenshot do comando status digitado no console.
say Apos a partida, execute fbtf_off.cfg para retornar para a configuracao original do servidor.