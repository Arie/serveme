// FBTF STOPWATCH 9v9 CFG
exec fbtf_common.cfg

mp_maxrounds				"2"
mp_tournament_stopwatch		"1"

exec fbtf_9v9.cfg

say FBTF 9v9 CFG - Mapas STOPWATCH (Ataque/Defesa)
say Pontuacao STOPWATCH: Melhor de 3 sets, o time que vencer 2 sets ganha a partida
say Formato dos sets: ABBAAB - Primeiro set Time A ataca, Time B defende, segundo set o inverso. O terceiro set, se houver, tem ordem igual a do primeiro set (Se necessario, disputar no bastao quem sera o time A)
say ------------
say **Aviso**: Lembrem-se que e necessario gravar POV-demo, alem de screenshot do comando status digitado no console.
say Apos a partida, execute fbtf_off.cfg para retornar para a configuracao original do servidor.