// FBTF 2v2 BBALL CFG
exec fbtf_common.cfg

mp_disable_respawn_times 			"1"
mp_winlimit							"10"
mp_tournament_whitelist 			"cfg/fbtf_bball_whitelist.txt"
tf_tournament_classlimit_scout		"0"
tf_tournament_classlimit_soldier	"2"
tf_tournament_classlimit_pyro		"0"
tf_tournament_classlimit_demoman	"1"
tf_tournament_classlimit_heavy		"0"
tf_tournament_classlimit_engineer	"0"
tf_tournament_classlimit_medic		"0"
tf_tournament_classlimit_sniper		"0"
tf_tournament_classlimit_spy		"0"
mp_tournament_restart

say FBTF 2v2 CFG - Mapas BBALL (Basketball)
say Pontuacao BBALL: a partida termina apos algum time fazer 10 pontos, sem limite de tempo
say ------------
say **Aviso**: Lembrem-se que e necessario gravar POV-demo, alem de screenshot do comando status digitado no console.
say Apos a partida, execute fbtf_off.cfg para retornar para a configuracao original do servidor.