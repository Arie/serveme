//=== Standard Settings, exec this for CP maps

//=== used for pure 2 player file consistency enforcement on all players on server
servercfgfile 	"tfcl_6s_standard.cfg"	

//== Loads Basic League Settings and Custom cfg settings
exec "tfcl_6s_base.cfg"

//=== Gameplay Settings for Standard type maps ===
mp_winlimit				"3" 
mp_maxrounds			"0" 
mp_timelimit 			"30" 
mp_tournament_stopwatch "0"

mp_tournament_restart

say "TFCL 6v6 TF2 Standard cfg v.11-13-17 executed, reload map once before start"
say "CP Rules - Match Winner is first to reach 5 TOTAL Caps"
say "CP Rules - Max 3 caps or 30 mins allowed in round 1"
say "Exec tfcl_off.cfg at match end to reset server."
